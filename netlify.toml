# ─────────────────────────────────────────────────────────────────────────────
# Netlify configuration — REPO ROOT
#
# ROOT CAUSE OF ALL 404s: Netlify UI had the wrong publish directory (repo
# root instead of frontend/out). Every page was buried at /frontend/out/login/
# instead of /login/. This [build] section overrides that with the correct
# paths. NODE_VERSION = "22" matches the version the working deploys used.
# ─────────────────────────────────────────────────────────────────────────────

[build]
  command   = "cd frontend && npm ci && npm run build"
  publish   = "frontend/out"
  functions = "frontend/netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."api-proxy"]
  timeout = 26

[build.environment]
  NODE_VERSION = "22"

# ── Root path ────────────────────────────────────────────────────────────────
# Next.js static export does NOT generate out/index.html for redirect() pages.
# Belt-and-suspenders: public/_redirects also covers this, but this rule
# ensures the CDN never caches a 404 for /.
[[redirects]]
  from   = "/"
  to     = "/login"
  status = 302

# Login is handled by a serverless function so it can read the
# Authorization response header from the backend and return the JWT token.
[[redirects]]
  from  = "/api/v1/users/login"
  to    = "/.netlify/functions/login"
  status = 200
  force  = true

# All other API calls are proxied through Netlify to avoid CORS issues.
[[redirects]]
  from  = "/api/*"
  to    = "https://api.rccgros.org/api/:splat"
  status = 200
  force  = true

# Forgot-password — static page, ensure trailing-slash variant is served too
[[redirects]]
  from   = "/forgot-password/"
  to     = "/forgot-password/index.html"
  status = 200

# ── Dynamic [id] routes ──────────────────────────────────────────────────────
# Next.js static export only pre-builds mock IDs (m-1, em-1, etc.).
# Real backend IDs are UUIDs. These rules serve the pre-built placeholder HTML
# for any UUID path; the Next.js client router then reads the real ID from the
# URL via useParams() and fetches the correct data from the API.

[[redirects]]
  from   = "/user-management/members/:id/"
  to     = "/user-management/members/m-1/"
  status = 200

[[redirects]]
