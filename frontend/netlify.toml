[build]
  command   = "npm run build"
  publish   = "out"
  functions = "netlify/functions"

# Login is handled by a serverless function so it can read the
# Authorization response header from the backend and return the
# JWT token inside the JSON body.
[[redirects]]
  from  = "/api/v1/users/login"
  to    = "/.netlify/functions/login"
  status = 200
  force  = true

# All other API calls are proxied through Netlify to avoid
# mixed-content errors (frontend is HTTPS, backend is HTTP).
[[redirects]]
  from  = "/api/*"
  to    = "http://137.184.72.16:6001/api/:splat"
  status = 200
  force  = true
