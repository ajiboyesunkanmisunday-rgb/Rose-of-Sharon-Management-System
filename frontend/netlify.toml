[build]
  command   = "npm run build"
  publish   = "out"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."api-proxy"]
  timeout = 26          # max Netlify allows; default is 10s

[build.environment]
  NODE_VERSION = "18"

# Root path — Next.js static export does NOT generate out/index.html
# because redirect() in page.tsx is a server-side call; Netlify needs
# an explicit rule to redirect visitors to the login page.
[[redirects]]
  from   = "/"
  to     = "/login"
  status = 302

# Login is handled by a serverless function so it can read the
# Authorization response header from the backend and return the
# JWT token inside the JSON body.
[[redirects]]
  from  = "/api/v1/users/login"
  to    = "/.netlify/functions/login"
  status = 200
  force  = true

# All other API calls are proxied through Netlify to avoid CORS issues.
[[redirects]]
  from  = "/api/*"
  to    = "https://api.rccgros.org/api/:splat"
  status = 200
  force  = true

# Forgot-password — static page, ensure trailing-slash variant is served too
[[redirects]]
  from   = "/forgot-password/"
  to     = "/forgot-password/index.html"
  status = 200

# ── Dynamic [id] routes ──────────────────────────────────────────────────────
# Next.js static export only pre-builds mock IDs (m-1, em-1, etc.).
# Real backend IDs are UUIDs. These rules serve the pre-built placeholder HTML
# for any UUID path; the Next.js client router then reads the real ID from the
# URL via useParams() and fetches the correct data from the API.

